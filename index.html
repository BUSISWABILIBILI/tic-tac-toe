<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tic Tac Toe</title>

    <link rel="stylesheet" href="src/style.css" />
  </head>

  <body>
    <main>
      <section class="game-panel" aria-labelledby="game-title">
        <div class="header">
          <p class="eyebrow">Two-player board game</p>
          <h1 id="game-title">Tic Tac Toe</h1>
        </div>

        <div class="player-form" aria-label="Player setup">
          <label>
            <span>Player X</span>
            <input type="text" id="player-one-name" placeholder="Player 1 name" />
          </label>
          <label>
            <span>Player O</span>
            <input type="text" id="player-two-name" placeholder="Player 2 name" />
          </label>
          <button class="start-btn" type="button">Start</button>
        </div>

        <div class="gameboard" aria-label="Tic tac toe board">
          <button class="cell" type="button" data-index="0" aria-label="Cell 1"></button>
          <button class="cell" type="button" data-index="1" aria-label="Cell 2"></button>
          <button class="cell" type="button" data-index="2" aria-label="Cell 3"></button>

          <button class="cell" type="button" data-index="3" aria-label="Cell 4"></button>
          <button class="cell" type="button" data-index="4" aria-label="Cell 5"></button>
          <button class="cell" type="button" data-index="5" aria-label="Cell 6"></button>

          <button class="cell" type="button" data-index="6" aria-label="Cell 7"></button>
          <button class="cell" type="button" data-index="7" aria-label="Cell 8"></button>
          <button class="cell" type="button" data-index="8" aria-label="Cell 9"></button>
        </div>

        <p class="status">Player 1's turn (X)</p>

        <div class="scoreboard" aria-label="Scoreboard">
          <p><span class="score-mark x-mark">X</span><span class="player-one-score">Player 1: 0</span></p>
          <p><span class="score-mark o-mark">O</span><span class="player-two-score">Player 2: 0</span></p>
        </div>

        <button class="restart-btn" type="button">Restart Game</button>
      </section>
    </main>

    <script src="src/script.js"></script>
  </body>
</html>
