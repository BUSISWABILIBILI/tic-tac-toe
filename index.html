<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tic Tac Toe</title>

    <link rel="stylesheet" href="src/style.css" />
  </head>

  <body>
    <main>
      <h1>Tic Tac Toe</h1>

      <div class="player-form">
        <input type="text" id="player-one-name" placeholder="Player 1 name" />
        <input type="text" id="player-two-name" placeholder="Player 2 name" />
        <button class="start-btn">Start Game</button>
      </div>

      <div class="gameboard">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>

        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>

        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
      </div>

      <p class="status">Player One's turn</p>

      <div class="scoreboard">
        <p><span class="player-one-score">Player 1: 0</span></p>
        <p><span class="player-two-score">Player 2: 0</span></p>
      </div>

      <button class="restart-btn">Restart Game</button>
    </main>

    <script src="src/script.js"></script>
  </body>
</html>
